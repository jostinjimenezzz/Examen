<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{presentation/fragments :: head}"></head>

<body>
<header th:replace="~{presentation/fragments :: header}"></header>

<nav>
    <div class="nav-title">INGRESO</div>
</nav>

<main>
    <div class="form">
        <form action="/login" method="post">
            <div class="form-icon">
                <img src="/images/login.png"/>
            </div>
            <div>
                <div class="label">Id</div>
                <div class="field">
                    <input type="text" name="username"/>
                </div>
            </div>
            <div>
                <div class="label">Clave</div>
                <div class="field">
                    <input type="password" name="password"/>
                </div>
            </div>
            <div class="form-submit">
                <input type="submit" value="Ingresar" class="button"/>
            </div>
        </form>
        <div th:if="${param.error != null}" class="error">
            <p>Credenciales incorrectas</p>
        </div>
    </div>
</main>

<footer th:replace="~{presentation/fragments :: footer}"></footer>
</body>
</html>
